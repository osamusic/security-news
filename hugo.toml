baseURL = "https://osamusic.github.io/zenn-content/"
languageCode = "ja"
title = "セキュリティニュース日報"
theme = "PaperMod"
enableRobotsTXT = true
buildDrafts = false

[params]
  author = "osamusic"
  description = "毎日更新のセキュリティニュースまとめ"
  defaultTheme = "auto"
  ShowReadingTime = false
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true

  [params.homeInfoParams]
    Title = "セキュリティニュース日報"
    Content = "脆弱性・サイバー攻撃・業界動向を毎日自動収集してお届けします。"

  [[params.socialIcons]]
    name = "rss"
    url = "index.xml"

[menu]
  [[menu.main]]
    name = "アーカイブ"
    url = "/archives/"
    weight = 10

[outputs]
  home = ["HTML", "RSS", "JSON"]
